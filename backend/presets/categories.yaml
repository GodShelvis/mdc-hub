  # --- 移动端 ---
  - id: "mobile-core"
    name: "移动端"
    aliases: [mobile, 移动端, 移动开发, iOS, Android, 安卓, 小程序, miniapp, Flutter, React Native, hybrid, 跨端, WebView, 原生, native]
    parent: "mobile"

  # --- 数据 ---
  - id: "data-core"
    name: "数据工程"
