# MDC Hub 预设标签库
# 安装时按用户角色选择加载，AI 生成文档时 tags 优先从此处选取
# 双语别名：任一命中即可匹配，输出统一使用 id
# 标注 (通用) 的术语只使用英文 id

tags:
