    name: "Java"
    aliases: [java, Java, JAVA, JDK, JVM]
    scope: [backend, mobile]

  - id: "python"
    name: "Python"
    aliases: [python, Python, PYTHON]
    scope: [backend, ai-ml, data]

  - id: "typescript"
    name: "TypeScript"
    aliases: [typescript, TypeScript, TS, ts]
    scope: [frontend, backend]

  - id: "javascript"
